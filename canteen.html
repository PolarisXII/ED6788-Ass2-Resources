<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canteen Survey</title>
</head>
<body>

  <h1>School Canteen Survey</h1>

  <form>

    
      <label for="firstname">What is your first name?</label>
      <input type="text" id="firstname" name="firstname">
    
    <br>
    
      <label for="visits">How many times per week do you visit the canteen?</label>
      <input type="number" id="visits" name="visits" min="0" max="5">
   

    <p>What are your favourite foods?</p>

    <input type="checkbox" id="sausageroll" name="food" value="Sausage Roll">
    <label for="sausageroll">Sausage Roll</label><br>

    <input type="checkbox" id="meatpie" name="food" value="Meat Pie">
    <label for="meatpie">Meat Pie</label><br>

    <input type="checkbox" id="spinachpie" name="food" value="Spinach Pie">
    <label for="spinachpie">Spinach Pie</label><br>

    <input type="checkbox" id="pizza" name="food" value="Pizza">
    <label for="pizza">Pizza</label><br>

    <input type="checkbox" id="hamcheese" name="food" value="Ham and Cheese Sandwich">
    <label for="hamcheese">Ham and Cheese Sandwich</label><br>

    <p>Do you think the canteen prices are fair?</p>

    <input type="radio" id="yes" name="prices" value="Yes">
    <label for="yes">Yes</label><br>

    <input type="radio" id="no" name="prices" value="No">
    <label for="no">No</label><br><br>

    <button type="submit">Submit Survey</button>

  </form>

</body>
</html>
